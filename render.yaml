# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect this repo in Render Dashboard → New → Blueprint

databases:
  - name: bibs-cart-sync-db
    plan: free
    databaseName: bibs_cart_sync
    user: bibs_cart_sync

services:
  - type: web
    name: bibs-b2b-cart-sync-api
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run render-build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bibs-cart-sync-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_customers,write_customers,read_companies,write_companies
      - key: SHOPIFY_APP_URL
        sync: false
      - key: PORT
        value: "3000"
